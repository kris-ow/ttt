name: Content Freshness Check

on:
  schedule:
    # Run at 12:00 UTC daily — after all 3 pipeline runs should have completed
    - cron: '0 12 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check-freshness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for stale content
        id: check
        run: |
          now=$(date +%s)
          alerts=""

          # ── Check unsummarized transcripts ──
          stale_files=""
          stale_count=0
          for f in news/*.txt; do
            base="${f%.txt}"
            if [[ "$f" != *_summary.txt ]] && [[ ! -f "${base}_summary.txt" ]]; then
              stale_files="$stale_files\n- \`$(basename $f)\`"
              stale_count=$((stale_count + 1))
            fi
          done

          if [ $stale_count -gt 0 ]; then
            alerts="$alerts\n### Unsummarized transcripts: $stale_count\n$stale_files"
            echo "Found $stale_count unsummarized transcript(s)"
          fi

          # ── Check Mac Mini heartbeat ──
          heartbeat="scripts/pipeline/heartbeat.json"
          if [ -f "$heartbeat" ]; then
            # Check each service
            for service in yt-transcripts x-summaries; do
              ts=$(node -e "
                const hb = JSON.parse(require('fs').readFileSync('$heartbeat','utf-8'));
                const t = hb.services && hb.services['$service'];
                if (t) console.log(t);
              " 2>/dev/null)

              if [ -n "$ts" ]; then
                service_epoch=$(date -d "$ts" +%s 2>/dev/null || echo "0")
                age_hours=$(( (now - service_epoch) / 3600 ))

                # yt-transcripts runs hourly — stale after 3h
                # x-summaries runs daily at 2am — stale after 27h
                if [ "$service" = "yt-transcripts" ]; then
                  threshold=3
                else
                  threshold=27
                fi

                if [ $age_hours -gt $threshold ]; then
                  alerts="$alerts\n### Mac Mini service stale: $service\nLast heartbeat: $ts ($age_hours hours ago, threshold: ${threshold}h)"
                  echo "$service is stale: $age_hours hours old"
                fi
              else
                alerts="$alerts\n### Mac Mini service missing: $service\nNo heartbeat timestamp found in $heartbeat"
                echo "$service has no heartbeat entry"
              fi
            done
          else
            alerts="$alerts\n### Mac Mini heartbeat missing\nNo heartbeat.json found — Mac Mini may not have pushed yet"
            echo "No heartbeat.json found"
          fi

          # Write alerts to file for the next step
          echo -e "$alerts" > /tmp/alerts.txt

          if [ -n "$alerts" ]; then
            echo "has_alerts=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_alerts=false" >> "$GITHUB_OUTPUT"
            echo "All checks passed"
          fi

      - name: Create or update issue
        if: steps.check.outputs.has_alerts == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const alerts = fs.readFileSync('/tmp/alerts.txt', 'utf-8').trim();
            const title = `Content freshness alert: ${new Date().toISOString().split('T')[0]}`;

            // Check for existing open issue
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'content-gap',
              per_page: 5,
            });

            const body = `Content freshness check found issues:\n\n${alerts}\n\n**Action:** Check Mac Mini services and/or trigger pipeline manually (\`gh workflow run daily-pipeline.yml -f mode=direct\`).\n\n*Auto-generated by freshness-check workflow*`;

            if (existing.data.length > 0) {
              // Comment on existing issue
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.data[0].number,
                body: `Update ${new Date().toISOString()}:\n\n${alerts}`,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['content-gap'],
              });
            }
