name: Daily Summary Pipeline

on:
  schedule:
    # Run 3x daily: 1:15, 9:15, 17:15 UTC (covers late transcripts within ~8h)
    - cron: '15 1,9,17 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pipeline
  cancel-in-progress: false

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 210 # 3.5 hours max (batch + up to 3 retries at 20min intervals)

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      # Transcripts are pushed directly to repo by Mac Mini yt-transcripts
      # Step 1: Summarize new transcripts via Claude Batch API
      - name: Run summary pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/pipeline/run.js

      # Step 3: Rebuild news.json (pipeline does this, but run standalone as safety net)
      - name: Rebuild news.json
        run: node scripts/build-news.js

      # Commit new summaries and updated state
      - name: Commit changes
        id: commit
        run: |
          git config user.name "TTT Pipeline Bot"
          git config user.email "pipeline@theteslathesis.com"
          git add news/ src/data/news.json scripts/pipeline/state.json scripts/pipeline/costs.json scripts/pipeline/extracted-facts.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No new summaries to commit"
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "Daily summaries: $(date -u +%Y-%m-%d)

          Summarize new transcripts via Claude Batch API, rebuild news.json"
            git pull --rebase
            git push
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      # Step 4: Build and deploy to GitHub Pages (GITHUB_TOKEN pushes don't trigger other workflows)
      - name: Build site
        if: steps.commit.outputs.has_changes == 'true'
        run: npm run build

      - name: Upload pages artifact
        if: steps.commit.outputs.has_changes == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        if: steps.commit.outputs.has_changes == 'true'
        uses: actions/deploy-pages@v4

  # Create a GitHub issue on pipeline failure
  notify-failure:
    runs-on: ubuntu-latest
    needs: pipeline
    if: failure()
    steps:
      - name: Create failure issue
        uses: actions/github-script@v7
        with:
          script: |
            const title = `Pipeline failure: ${new Date().toISOString().split('T')[0]}`;
            // Don't create duplicate issues
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'pipeline-failure',
              per_page: 5,
            });
            if (existing.data.some(i => i.title === title)) return;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body: `The daily summary pipeline failed.\n\n**Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n**Time:** ${new Date().toISOString()}\n\nCheck the workflow logs for details.`,
              labels: ['pipeline-failure'],
            });
